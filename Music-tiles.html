<script>
(function(){
  "use strict";

  /* ====================== MOTÍVY (jednoduché SVG) ====================== */
  const PALETTE = ['#f5c6d6','#cde8a8','#f7dd8e','#fbcfa6','#dcc8ee','#bfe0ef'];
  const darker = {'#f5c6d6':'#e79ab2','#cde8a8':'#a8cf72','#f7dd8e':'#e9c455',
                  '#fbcfa6':'#eeac74','#dcc8ee':'#bda0db','#bfe0ef':'#8fc4dc'};

  function apple(c){const d=darker[c];return `
    <svg viewBox="0 0 100 100"><g>
      <rect x="46" y="10" width="6" height="18" rx="3" fill="#a9805a"/>
      <ellipse cx="64" cy="18" rx="13" ry="8" fill="#9bc36a" transform="rotate(20 64 18)"/>
      <path d="M50 26c16 0 32 10 32 36 0 22-16 32-32 32S18 84 18 62c0-26 16-36 32-36z" fill="${c}"/>
      <ellipse cx="38" cy="48" rx="8" ry="12" fill="#fff" opacity=".45"/>
      <circle cx="40" cy="60" r="3.5" fill="${d}"/><circle cx="60" cy="60" r="3.5" fill="${d}"/>
      <path d="M40 72q10 8 20 0" stroke="${d}" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    </g></svg>`;}

  function balloon(c){const d=darker[c];return `
    <svg viewBox="0 0 100 100"><g>
      <path d="M50 80c0-3 0-5 0-7" stroke="${d}" stroke-width="2" fill="none"/>
      <path d="M50 73l-5 7h10z" fill="${c}"/>
      <ellipse cx="50" cy="40" rx="33" ry="38" fill="${c}"/>
      <ellipse cx="38" cy="28" rx="9" ry="13" fill="#fff" opacity=".45"/>
      <circle cx="42" cy="42" r="3.5" fill="${d}"/><circle cx="58" cy="42" r="3.5" fill="${d}"/>
      <path d="M42 54q8 7 16 0" stroke="${d}" stroke-width="3.5" fill="none" stroke-linecap="round"/>
      <path d="M50 80q-12 8 0 16" stroke="#cdbba6" stroke-width="2.5" fill="none"/>
    </g></svg>`;}

  function star(c){const d=darker[c];return `
    <svg viewBox="0 0 100 100"><g>
      <path d="M50 8l11 24 26 2.5-19.5 17.5L73 84 50 70 27 84l5.5-32L13 34.5 39 32z"
        fill="${c}" stroke="${d}" stroke-width="3" stroke-linejoin="round"/>
      <circle cx="43" cy="48" r="3.3" fill="${d}"/><circle cx="57" cy="48" r="3.3" fill="${d}"/>
      <path d="M43 58q7 6 14 0" stroke="${d}" stroke-width="3.2" fill="none" stroke-linecap="round"/>
    </g></svg>`;}

  function animal(c){const d=darker[c];return `
    <svg viewBox="0 0 100 100"><g>
      <circle cx="30" cy="28" r="13" fill="${c}"/><circle cx="70" cy="28" r="13" fill="${c}"/>
      <circle cx="30" cy="28" r="6" fill="#fff" opacity=".5"/><circle cx="70" cy="28" r="6" fill="#fff" opacity=".5"/>
      <circle cx="50" cy="55" r="36" fill="${c}"/>
      <circle cx="38" cy="50" r="5" fill="${d}"/><circle cx="62" cy="50" r="5" fill="${d}"/>
      <circle cx="28" cy="62" r="7" fill="#fff" opacity=".5"/><circle cx="72" cy="62" r="7" fill="#fff" opacity=".5"/>
      <path d="M44 64h12l-6 6z" fill="${d}"/>
      <path d="M40 72q10 9 20 0" stroke="${d}" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    </g></svg>`;}

  function flower(c){const d=darker[c];return `
    <svg viewBox="0 0 100 100"><g fill="${c}">
      <circle cx="50" cy="22" r="15"/><circle cx="78" cy="42" r="15"/>
      <circle cx="67" cy="74" r="15"/><circle cx="33" cy="74" r="15"/><circle cx="22" cy="42" r="15"/>
      <circle cx="50" cy="50" r="20" fill="#fff2c4"/>
      <circle cx="44" cy="48" r="3" fill="${d}"/><circle cx="56" cy="48" r="3" fill="${d}"/>
      <path d="M44 56q6 5 12 0" stroke="${d}" stroke-width="3" fill="none" stroke-linecap="round"/>
    </g></svg>`;}

  const MOTIFS = [apple, balloon, star, animal, flower];

  /* ====================== AUDIO (Web Audio API) ====================== */
  let actx=null;
  let muted=false;

  function ensureAudio(){
    if(actx) return;
    actx=new (window.AudioContext||window.webkitAudioContext)();
  }

  /* ---- iOS "unmute": tichý slučkový <audio> drží audio session v režime
     PLAYBACK, aby Web Audio (tóny) bolo počuť aj pri fyzickom prepínači stíšenia.
     Bez toho iOS Web Audio stíši, ale MP3 (media element) hrá ďalej. ---- */
  function makeSilentWavURI(sec){
    const sr=8000, n=Math.floor(sr*sec), buf=new ArrayBuffer(44+n), dv=new DataView(buf);
    let p=0; const ws=s=>{ for(let i=0;i<s.length;i++) dv.setUint8(p++,s.charCodeAt(i)); };
    ws('RIFF'); dv.setUint32(p,36+n,true);p+=4; ws('WAVE'); ws('fmt ');
    dv.setUint32(p,16,true);p+=4; dv.setUint16(p,1,true);p+=2; dv.setUint16(p,1,true);p+=2;
    dv.setUint32(p,sr,true);p+=4; dv.setUint32(p,sr,true);p+=4; dv.setUint16(p,1,true);p+=2; dv.setUint16(p,8,true);p+=2;
    ws('data'); dv.setUint32(p,n,true);p+=4;
    for(let i=0;i<n;i++) dv.setUint8(p++,128); // 8-bit ticho = 128
    const u8=new Uint8Array(buf); let bin=''; for(let i=0;i<u8.length;i++) bin+=String.fromCharCode(u8[i]);
    return 'data:audio/wav;base64,'+btoa(bin);
  }
  let keepAlive=null;
  function ensureKeepAlive(){
    if(keepAlive) return keepAlive;
    keepAlive=new Audio(makeSilentWavURI(0.7));
    keepAlive.loop=true; keepAlive.preload='auto'; keepAlive.volume=1; keepAlive.muted=false;
    keepAlive.setAttribute('playsinline',''); keepAlive.setAttribute('webkit-playsinline','');
    return keepAlive;
  }
  function keepAliveOn(){ try{ ensureKeepAlive(); keepAlive.currentTime=0; const p=keepAlive.play(); if(p&&p.catch) p.catch(()=>{}); }catch(e){} }
  function keepAliveOff(){ try{ if(keepAlive) keepAlive.pause(); }catch(e){} }

  // TRIANGEL "cinknutie" — krátky kovový zvuk pri trafení
  function triangleDing(){
    if(!actx||muted) return;
    const t=actx.currentTime;
    const partials=[2349, 3136, 4699, 6272]; // vysoké, mierne inharmonické
    const out=actx.createGain();
    out.gain.value=0.0001;
    out.gain.setValueAtTime(0.5,t);
    out.gain.exponentialRampToValueAtTime(0.0008,t+0.9);
    out.connect(actx.destination);
    partials.forEach((p,i)=>{
      const o=actx.createOscillator(), g=actx.createGain();
      o.type='sine'; o.frequency.value=p*(1+(Math.random()-.5)*0.004);
      g.gain.value=[1,0.6,0.4,0.25][i];
      o.connect(g).connect(out);
      o.start(t); o.stop(t+0.95);
    });
  }

  // POTLESK — prehrá nahraný súbor applause.mp3 (rešpektuje stlmenie)
  function applause(){
    if(muted) return;
    const a=document.getElementById('applauseAudio');
    if(!a) return;
    try{ a.currentTime=0; a.play().catch(()=>{}); }catch(e){}
  }

  /* ====================== STAV HRY ====================== */
  const stage=document.getElementById('stage');
  const lanesEl=document.getElementById('lanes');
  const menu=document.getElementById('menu');
  const pause=document.getElementById('pause');
  const fx=document.getElementById('fx');
  const scoreBadge=document.getElementById('score');
  const starRow=document.getElementById('starRow');
  const STARS_PER_SET=5;
  const STAR_PATH="M12 2l2.9 6.3 6.9.7-5.1 4.6 1.4 6.8L12 17.8 5.9 20.4l1.4-6.8L2.2 9l6.9-.7z";
  function buildStarRow(){
    starRow.innerHTML='';
    for(let i=0;i<STARS_PER_SET;i++){
      starRow.insertAdjacentHTML('beforeend',
        '<svg class="slot" viewBox="0 0 24 24"><path d="'+STAR_PATH+'"/></svg>');
    }
  }
  function fillStar(index){
    const s=starRow.children[index];
    if(!s) return;
    s.classList.add('on'); s.classList.remove('pop'); void s.offsetWidth; s.classList.add('pop');
  }
  function resetStarRow(){
    [...starRow.children].forEach(s=>s.classList.remove('on','pop'));
  }
  // počet rozsvietêných hviezdičiek podľa POMERU TRAFENýCH dlaždíc k CELKOVÉMU počtu
  // dlaždíc v pesničke. Plných 5 hviezdičiek až keď hráč stlačí 90 % všetkých dlaždíc.
  const STAR_TH=[0.18, 0.36, 0.54, 0.72, 0.90];
  function litFromRatio(){
    const total=songBeats.length;
    if(total<=0) return 0;
    const r=score/total;
    let n=0; for(const t of STAR_TH){ if(r>=t) n++; }
    return n;
  }
  function refreshStars(){
    const n=litFromRatio();
    for(let i=0;i<STARS_PER_SET;i++){
      const s=starRow.children[i]; if(!s) continue;
      if(i<n){
        if(!s.classList.contains('on')){ s.classList.add('on'); s.classList.remove('pop'); void s.offsetWidth; s.classList.add('pop'); }
      } else {
        s.classList.remove('on','pop');
      }
    }
  }
  buildStarRow();
  const homeBtn=document.getElementById('homeBtn');
  let progDone=false;

  function setProgress(pct){
    homeBtn.style.setProperty('--p', pct);
  }
  let progLast=0;
  function updateProgress(){
    const now=performance.now();
    if(now-progLast<200) return; // stačí ~5× za sekundu, nie každý frame
    progLast=now;
    let p=0;
    const _d=clkDur();
    if(_d && isFinite(_d)) p=clkTime()/_d;
    p=Math.max(0,Math.min(1,p));
    const pct=p*100;
    setProgress(pct);
    if(pct>=100 && !progDone){
      progDone=true;
      const r=homeBtn.getBoundingClientRect();
      sparkle(r.left+r.width/2, r.top+r.height/2);
    } else if(pct<5 && progDone){
      progDone=false;
    }
  }

  // STOPKY V DLHEJ PAUZE: ak je medzi dvoma taktami medzera dlhšia ako 5 s,
  // zobraz ten istý odpočet (počíta do najbližšieho taktu). Po POSLEDNOM takte
  // sa už nezobrazí, aj keby do konca pesničky bola dlhá pauza.
  function updateGapCountdown(ct){
    if(waiting){ if(gapActive){ gapActive=false; countdownEl.classList.remove('show'); } return; }
    if(countingDown){ return; } // úvodný odpočet má prednosť pred touto stopkou
    let idx=-1;
    for(let i=0;i<songBeats.length;i++){ if(songBeats[i].t>ct){ idx=i; break; } }
    let show=false, remain=0;
    if(idx>0){ // existuje predošlý aj nasledujúci takt → skutočná medzera (nie koniec)
      const prevT=songBeats[idx-1].t, nextT=songBeats[idx].t;
      if(nextT-prevT>GAP_THRESHOLD){ remain=nextT-ct; if(remain>0) show=true; }
    }
    if(show){
      if(!gapActive){ gapActive=true; gapLastShown=-1; countdownEl.classList.remove('loading'); countdownEl.classList.add('show'); }
      const ci=Math.ceil(remain);
      if(ci!==gapLastShown){ gapLastShown=ci; countNum.textContent=ci; countNum.classList.remove('tick'); void countNum.offsetWidth; countNum.classList.add('tick'); }
    } else if(gapActive){
      gapActive=false; countdownEl.classList.remove('show');
    }
  }

  // KONFETY NA KONCI: keď prejde posledný takt a do konca pesničky ostávajú
  // aspoň 3 s, zobraz opakujúci sa GIF v strede až do konca.
  function updateEndConfetti(ct){
    if(!songBeats.length){ return; }
    const lastT=songBeats[songBeats.length-1].t;
    const dur=clkDur();
    const longTail=isFinite(dur) ? (dur-lastT>=END_CELEBRATE) : true;
    const show = ct>lastT && longTail && !finished;
    if(show && !confettiEl.classList.contains('show')) confettiEl.classList.add('show');
  }
  function hideConfetti(){ confettiEl.classList.remove('show'); }

  let cols=3;
  let tileStyle='keys';
  let tiles=[], lastTime=0, running=false, raf=null;
  let score=0;
  let misses=0;
  let laneEls=[];

  // --- režim vlastnej pesničky ---
  const songAudio=document.getElementById('songAudio');
  let songMode=false, songData=null, songBeats=[];
  let waiting=false; // DLAŽDICE-NOTY: hra zastavená a čaká na ťuknutie
  let songStarted=false, songTa=0, tileSeq=0, leadIn=2, preRoll=0, finished=false;
  let countdownRaf=null, countingDown=false, cdAborted=false;
  let gapActive=false, gapLastShown=-1;
  const GAP_THRESHOLD=5; // pauza medzi taktami dlhšia ako 5 s → zobraz stopky
  const confettiEl=document.getElementById('confetti');
  const END_CELEBRATE=3; // ak po poslednom takte ostávajú aspoň 3 s do konca → konfety
  const COUNTDOWN_SECS=3;
  const countdownEl=document.getElementById('countdown');
  const countNum=document.getElementById('countNum');

  /* ====================== REŽIM: MP3 vs. TÓNOVÝ ZÁPIS ======================
     Pesnička môže byť MP3 (audioUrl) — vtedy je <audio> hlavné hodiny — alebo
     „tónový zápis" z MIDI (cez Convertor): noty s výškou (m), dĺžkou (d) a časom
     (t). Vtedy si hru aj zvuk syntetizuje sama (jemný klavír) a hodiny bežia
     podľa AudioContextu. Oba formáty fungujú cez rovnaké rozhranie clk*(). */
  let mode='mp3';      // 'mp3' | 'tones'
  let toneP=null;
  let speedLevel=2; const SPEED_RATE={1:0.7,2:1.0,3:1.4}; let songRate=1; // rýchlosť prehrávania tónového zápisu
  const MP3_RATE={1:0.7,2:0.85,3:1.0}; // MP3: 3 = originál, 2 a 1 pomaššie

  function isTone(){ return mode==='tones'; }
  function clkTime(){ return isTone()? (toneP?toneP.currentTime:0) : songAudio.currentTime; }
  function clkDur(){ return isTone()? (toneP?toneP.duration:0) : songAudio.duration; }
  function clkEnded(){ return isTone()? (toneP?toneP.ended:true) : songAudio.ended; }
  function clkPlay(){ try{ return (isTone()? toneP.play() : songAudio.play())||Promise.resolve(); }catch(e){ return Promise.resolve(); } }
  function clkPause(){ try{ if(isTone()){ if(toneP) toneP.pause(); } else songAudio.pause(); }catch(e){} }
  function clkSeek(t){ try{ if(isTone()){ if(toneP) toneP.seek(t); } else songAudio.currentTime=t; }catch(e){} }

  function detectTones(d){
    if(d && d.mode==='tones') return true;
    if(d && (!d.audioUrl || !String(d.audioUrl).trim()) && Array.isArray(d.beats) && d.beats.some(b=>b && b.m!=null)) return true;
    return false;
  }

  // Syntetizátor tónového zápisu: naplánuje noty (jemný klavír) cez Web Audio
  // Pri „tónovom zápise" je hra nástroj: t\u00f3n znie LEN ke\u010f die\u0165a \u0165ukne na dla\u017edicu
  // (jej vlastn\u00e1 v\u00fd\u0161ka). \u017diadna automatick\u00e1 hudba na pozad\u00ed, \u017eiadny triangel.
  // Tento objekt je teda hodiny (currentTime z performance.now(), be\u017e\u00ed v\u017edy)
  // + klav\u00edr na po\u017eiadanie cez hit().
  function buildTonePlayer(data){
    ensureAudio();
    let totalDur=+data.duration||0;
    if(!totalDur){ const bs=data.beats||[]; for(const b of bs) totalDur=Math.max(totalDur,(+b.t)+(+b.d||0.4)); totalDur+=1.4; }
    let offset=0, perfBase=0, running=false;
    const live=new Set();
    const master=actx.createGain(); master.gain.value=0.95; master.connect(actx.destination);
    function cur(){ return running ? offset+(performance.now()/1000 - perfBase)*songRate : offset; }
    function pianoVoice(m, d, v, when){
      if(muted) return;
      const f=440*Math.pow(2,(m-69)/12); d=Math.max(0.3,d||0.45); v=(v!=null?v:0.85);
      const peak=0.22*v;
      // Spoločná obálka: ostrý úder kladivka + dlhší prirodzený dozvuk akustického klavíra
      const g=actx.createGain();
      g.gain.setValueAtTime(0.0001,when);
      g.gain.linearRampToValueAtTime(peak,when+0.005);           // úder kladivka (rýchly nábeh)
      g.gain.exponentialRampToValueAtTime(peak*0.5,when+0.09);   // rýchly počiatočný pokles
      g.gain.exponentialRampToValueAtTime(peak*0.2,when+0.45);
      g.gain.exponentialRampToValueAtTime(0.0001,when+d+0.45);   // dlhý mäkký doznievajúci chvost
      // Tlmič strún: tón časom tmavne
      const lp=actx.createBiquadFilter(); lp.type='lowpass'; lp.Q.value=0.4;
      lp.frequency.setValueAtTime(Math.min(8500,f*9),when);
      lp.frequency.exponentialRampToValueAtTime(Math.max(900,f*2.4),when+Math.min(1.3,d+0.4));
      g.connect(lp).connect(master);
      const stop=when+d+0.8;
      // Additívna sada s miernou inharmonicitou (skutočné klavírne struny nie sú dokonale harmonické)
      const B=0.0006; // koeficient inharmonicity
      const partials=[[1,1.0],[2,0.6],[3,0.34],[4,0.2],[5,0.12],[6,0.07],[7,0.04],[8,0.025]];
      partials.forEach(([n,am])=>{
        const o=actx.createOscillator(); o.type='sine';
        o.frequency.value=f*n*Math.sqrt(1+B*n*n);
        const og=actx.createGain();
        // vyššie harmonické doznievajú rýchlejšie → jas hneď po údere, potom mäkne
        og.gain.setValueAtTime(am,when);
        og.gain.exponentialRampToValueAtTime(Math.max(0.0001,am*0.05), when+Math.min(d+0.4, 0.5+(8-n)*0.14));
        o.connect(og).connect(g);
        o.start(when); o.stop(stop); live.add(o); o.onended=()=>live.delete(o);
      });
    }
    function kill(){ const t=actx.currentTime; live.forEach(o=>{try{o.stop(t);}catch(e){}}); live.clear(); }
    return {
      get currentTime(){ return Math.min(cur(), totalDur); },
      get duration(){ return totalDur; },
      get ended(){ return cur()>=totalDur; },
      play(){ if(running) return Promise.resolve(); if(actx.state==='suspended') actx.resume(); perfBase=performance.now()/1000; running=true; return Promise.resolve(); },
      pause(){ if(!running) return; offset=cur(); running=false; kill(); },
      seek(t){ offset=Math.max(0,t||0); if(running) perfBase=performance.now()/1000; },
      hit(m,d,v){ try{ pianoVoice(m,d,v,actx.currentTime); }catch(e){} },
      destroy(){ running=false; kill(); try{master.disconnect();}catch(e){} }
    };
  }

  function buildLanes(){
    lanesEl.innerHTML='';
    laneEls=[];
    // užšia, vycentrovaná herná plocha (stĺpce bližšie k stredu)
    const w = cols===1
      ? Math.min(window.innerWidth*0.92, window.innerHeight*0.52)
      : Math.min(window.innerWidth*0.94, window.innerHeight*0.92);
    lanesEl.style.width = Math.round(w)+'px';
    for(let i=0;i<cols;i++){
      const l=document.createElement('div');
      l.className='lane';
      lanesEl.appendChild(l);
      laneEls.push({el:l, lastSpawn:-99, lastTile:null});
    }
    _geom=null; // šírka stĺpcov sa zmenila → prepočítaj cachovanú geometriu
  }

  function tileSize(){
    const lw=(lanesEl.clientWidth||window.innerWidth)/cols;
    // výška dlaždice je rovnaká pre všetky (tesné ukladanie ribbonu)
    const block=Math.min(window.innerHeight*0.26, lw*1.25);
    const art=Math.min(lw*0.82, block*0.92);
    return {art, block};
  }
  // rýchlosť padania: jedna dlaždica prejde svoju výšku za fallSpeedTime sekúnd.
  // Odvodzuje sa z NAJKRATŠIEHO odstupu taktov, aby sa dlaždice neprekrývali.
  let fallSpeedTime=0.4;
  function fallVy(){ const {block}=tileSize(); return block/fallSpeedTime; }
  // dlaždica je „dlhá nota" (na podržanie), ak je aspoň 1,55× dlhšia než základný blok
  const LONG_FACTOR=1.55;

  // Cieľová („kliknací“) lin ka: dlaždica je tu presne v čase svojho taktu.
  // Posunutá nižšie do pohodlného dosahu palca — dlaždice tak začínajú padať
  // skôr (väčší predstih) a dieťa na ne ťuká v dolnej polovici obrazovky.
  function hitLineY(){
    const top=parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--toolbar-h'))||60;
    return top + (window.innerHeight - top) * 0.78;
  }

  // cachovaná geometria — prepočíta sa len pri zmene veľkosti okna,
  // nie každý frame (getComputedStyle + merania každý frame sekajú slabšie GPU)
  let _geom=null;
  function geom(){
    if(!_geom){
      const ts=tileSize();
      _geom={block:ts.block, art:ts.art, vy:fallVy(), mid:hitLineY(), vh:window.innerHeight};
    }
    return _geom;
  }
  window.addEventListener('resize',()=>{ _geom=null; });

  // Dĺžka dlaždice (len pre KLÁVESY): natiahne sa nahor až po ďalšiu dlaždicu,
  // takže väčšie medzery medzi taktami = dlhšie klávesy — ale nikdy sa neprekryjú.
  function tileLen(seq, block, vy){
    if(tileStyle!=='keys') return block;            // ikony nechávame v pôvodnej veľkosti
    let dtNext = (seq+1 < songBeats.length)
      ? (songBeats[seq+1].t - songBeats[seq].t)
      : fallSpeedTime;                              // posledná dlaždica: štandard
    const gap = dtNext*vy;                          // medzera po ďalšiu dlaždicu (bez prekrytia)
    const maxLen = Math.min(window.innerHeight*0.5, block*2.6);
    return Math.max(block, Math.min(maxLen, gap));
  }

  function spawnTile(laneIndex, atY, isLong){
    const {art,block}=tileSize();
    const lw=(lanesEl.clientWidth||window.innerWidth)/cols;
    const lane=laneEls[laneIndex];
    const t=document.createElement('div');
    t.className='tile';
    t.style.height=block+'px';
    const art_=document.createElement('div');
    art_.className='art';
    if(tileStyle==='keys'){
      art_.classList.add('key');
      art_.style.width=(lw*0.92)+'px';
      art_.style.height=block+'px';     // rovnaká plná výška — ribbon tesne na sebe
      if(isLong){
        art_.classList.add('long');
        art_.innerHTML='<div class="hold-fill"></div><div class="hold-track"></div><div class="hold-head"></div>';
      }
    } else {
      const motif=MOTIFS[(Math.random()*MOTIFS.length)|0];
      const color=PALETTE[(Math.random()*PALETTE.length)|0];
      art_.style.width=art+'px';
      art_.style.height=art+'px';
      art_.innerHTML=motif(color);
    }
    t.appendChild(art_);
    const startY=(atY===undefined)? -block : atY;
    const obj={el:t, art:art_, y:startY, lane:laneIndex, h:block, hit:false, dead:false,
      long:!!isLong, holding:false, held:false, pointerId:null, lastProg:0, tone:null,
      fillEl: isLong ? art_.querySelector('.hold-fill') : null};
    art_.addEventListener('pointerdown',(e)=>{
      e.preventDefault();
      if(obj.long) startHold(obj,e); else onHit(obj);
    },{passive:false});
    lane.el.appendChild(t);
    obj.el.style.transform='translate3d(0,'+obj.y+'px,0)';
    tiles.push(obj);
    return obj;
  }

  function onHit(obj){
    if(obj.hit||obj.dead) return;
    obj.hit=true; obj.dead=true;
    obj.el.classList.add('pop');
    if(isTone() && toneP && obj.note && obj.note.m!=null) toneP.hit(obj.note.m, obj.note.d, obj.note.v);
    else triangleDing();
    score++;
    refreshStars();
    // iskričky z miesta dlaždice
    const r=obj.art.getBoundingClientRect();
    sparkle(r.left+r.width/2, r.top+r.height/2);
    setTimeout(()=>{ obj.el.remove(); }, 230);
  }

  /* ====================== DLHÉ (DRŽANÉ) NOTY ======================
     Hráč ťukne na začiatok dlhej dlaždice a PODRŽÍ prst, kým celý pás
     neprejde cez cáľovú čiaru. Postup držania sa zvýrazňuje farebnou výplňou.
     Ak hráč pustí prst predčasne (a nie je takmer hotovo), nota sa nepočíta. */
  function startHold(o, e){
    if(o.hit||o.dead||o.holding||o.held) return;
    o.holding=true;
    o.pointerId=(e&&e.pointerId!=null)?e.pointerId:null;
    o.el.classList.add('holding');
    if(isTone() && toneP && o.note && o.note.m!=null){
      toneP.hit(o.note.m, Math.max(0.7, o.note.d||0.7), o.note.v);   // tón dlaždice pri stlačení dlhej noty (bez triangla)
    } else {
      triangleDing();      // gong pri stlačení dlhej noty (MP3) — počas držania už ďalší zvuk neznie
    }
    try{ if(o.pointerId!=null) o.art.setPointerCapture(o.pointerId); }catch(_){}
    const release=(ev)=>{
      if(o.pointerId!=null && ev.pointerId!==o.pointerId) return;
      o.art.removeEventListener('pointerup',release);
      o.art.removeEventListener('pointercancel',release);
      o.art.removeEventListener('lostpointercapture',release);
      endHold(o);
    };
    o.art.addEventListener('pointerup',release);
    o.art.addEventListener('pointercancel',release);
    o.art.addEventListener('lostpointercapture',release);
  }
  // prst zdvihnutý: ak už takmer celý pás prešiel — uznáme, inak míň
  function endHold(o){
    if(o.held||o.dead) return;
    if(o.lastProg>=0.82){ completeHold(o); return; }
    o.holding=false; o.dead=true;
    stopHoldTone(o);
    o.el.classList.remove('holding');
    o.el.classList.add('miss');
    misses++; refreshStars();
    setTimeout(()=>o.el.remove(),500);
  }
  // celý pás prešiel cez čiaru počas držania — úspech
  function completeHold(o){
    if(o.held||o.dead) return;
    o.held=true; o.holding=false; o.hit=true; o.dead=true;
    stopHoldTone(o);
    o.el.classList.remove('holding');
    if(o.fillEl) o.fillEl.style.height='100%';
    o.el.classList.add('pop');
    score++; refreshStars();      // na konci dlhej noty už gong nehrá
    const r=o.art.getBoundingClientRect();
    sparkle(r.left+r.width/2, r.top+r.height/2);
    setTimeout(()=>o.el.remove(),440);
  }
  // jemný držaný tón počas držania (dlhý zvuk = dlhá nota)
  function startHoldTone(o){
    if(!actx||muted||o.tone) return;
    try{
      const t=actx.currentTime;
      const osc=actx.createOscillator(), g=actx.createGain();
      osc.type='sine'; osc.frequency.value=523.25; // C5
      g.gain.value=0.0001; g.gain.linearRampToValueAtTime(0.11, t+0.05);
      osc.connect(g).connect(actx.destination);
      osc.start(t);
      o.tone={osc, gain:g};
    }catch(_){}
  }
  function stopHoldTone(o){
    if(!o||!o.tone) return;
    try{
      const t=actx.currentTime;
      o.tone.gain.gain.cancelScheduledValues(t);
      o.tone.gain.gain.setValueAtTime(o.tone.gain.gain.value, t);
      o.tone.gain.gain.exponentialRampToValueAtTime(0.0001, t+0.12);
      o.tone.osc.stop(t+0.14);
    }catch(_){}
    o.tone=null;
  }

  function sparkle(x,y){
    const colors=['#f3c94a','#f5a0c0','#9bc36a','#8fc4dc','#dcc8ee'];
    const n=7;
    for(let i=0;i<n;i++){
      const s=document.createElement('div');
      s.className='spark';
      const ang=(Math.PI*2*i/n)+Math.random()*0.6;
      const dist=50+Math.random()*60;
      s.style.left=x+'px'; s.style.top=y+'px';
      s.style.setProperty('--dx',(Math.cos(ang)*dist)+'px');
      s.style.setProperty('--dy',(Math.sin(ang)*dist - 30)+'px');
      s.style.setProperty('--rot',(Math.random()*360)+'deg');
      const sz=12+Math.random()*14;
      s.innerHTML=`<svg width="${sz}" height="${sz}" viewBox="0 0 24 24"><path d="M12 2l2.9 6.3 6.9.7-5.1 4.6 1.4 6.8L12 17.8 5.9 20.4l1.4-6.8L2.2 9l6.9-.7z" fill="${colors[i%colors.length]}"/></svg>`;
      fx.appendChild(s);
      setTimeout(()=>s.remove(),720);
    }
  }

  let lastLane=-1;
  function autoLane(){
    if(cols<=1) return 0;
    let l=Math.floor(Math.random()*cols);
    if(l===lastLane) l=(l+1+Math.floor(Math.random()*(cols-1)))%cols; // vždy iný než predošlý
    lastLane=l;
    return l;
  }

  /* ====================== MÓD PIANO ======================
     Noty padajú zhora, každá vo svojom stĺpci nad svojou (dúhovou) klávesou.
     Keď vedúca nota doletí ku klávesnici, VŠETKO zastane a čaká, kým dieťa
     stlačí správnu klávesu — vtedy zaznie tón. Dlhšie noty treba podržať. */
  const PN_WHITE=[60,62,64,65,67,69,71,72];
  const PN_COL={60:'#e63329',62:'#ef8a23',64:'#f4d711',65:'#1c9b3e',67:'#6ec7e8',69:'#2273c9',71:'#7a3a9e',72:'#e63329'};
  const PN_PC=['a','s','d','f','g','h','j','k'];
  let PN=null, gameMode='tiles', gameChoice='tiles';
  function pianoKeyIndex(m){ let x=+m; while(x<60)x+=12; while(x>72)x-=12;
    let bi=0,bd=1e9; PN_WHITE.forEach((w,i)=>{ const dd=Math.abs(w-x); if(dd<bd){bd=dd;bi=i;} }); return bi; }
  function pnNoteSVG(W,H){
    // ♪: hlavička (dole) aj prápor (hore) majú stálu veľkosť ako v krátkej guľôčke, predlžuje sa len stopka
    const col='rgba(255,255,255,.96)';
    const f=W*0.62;                       // referenčná veľkosť ako pri krátkej note
    const headRx=f*0.221, headRy=f*0.166; // hlavička o 15 % menšia
    const gap=W*0.18;                     // medzera hore aj dole medzi notou a dlaždicou
    const cx=W*0.50-f*0.10, cy=H-headRy-gap;
    const stemW=Math.max(2,f*0.085);
    const stemX=cx+headRx*0.85;
    const top=gap, stemBotY=cy-headRy*0.2;
    const flag='M'+(stemX+stemW)+' '+top+' q '+(f*0.50)+' '+(f*0.28)+' '+(f*0.095)+' '+(f*0.78)+
               ' q '+(f*0.20)+' '+(-f*0.37)+' '+(-(f*0.095))+' '+(-(f*0.68))+' z';
    return '<svg class="noteSvg" viewBox="0 0 '+W+' '+H+'" width="'+W+'" height="'+H+'">'+
      '<rect x="'+stemX+'" y="'+top+'" width="'+stemW+'" height="'+(stemBotY-top)+'" fill="'+col+'"/>'+
      '<path d="'+flag+'" fill="'+col+'"/>'+
      '<ellipse cx="'+cx+'" cy="'+cy+'" rx="'+headRx+'" ry="'+headRy+'" fill="'+col+'" transform="rotate(-20 '+cx+' '+cy+')"/>'+
      '</svg>';
  }

  // Biely notový glyf vo vnútri farebného obalu (kruh = štvrťová, obdĺžnik = polovičná/celá).
  //  • štvrťová → plná hlavička + nožička
  //  • polovičná → prázdna hlavička + nožička (nožička siaha po vrch obalu)
  //  • celá     → prázdna hlavička, bez nožičky
  // Hlavička má STÁLU veľkosť (headD); dĺžka obalu H = trvanie tónu (d×vy),
  // takže nota celá prejde za klávesnicu presne keď tón dohrá (na mobile aj desktope rovnako).
  function pnGlyphSVG(W, H, type, headD){
    const col='rgba(255,255,255,.96)';
    headD = headD || W;
    if(type==='quarter'){
      const rx=headD*0.22, ry=headD*0.175, cx=W*0.44, cy=H*0.60;
      const stemW=Math.max(2.5,headD*0.075), stemX=cx+rx*0.74, top=H*0.16;
      return '<svg class="noteSvg" viewBox="0 0 '+W+' '+H+'" width="'+W+'" height="'+H+'">'+
        '<rect x="'+(stemX-stemW/2)+'" y="'+top+'" width="'+stemW+'" height="'+(cy-top)+'" rx="'+(stemW/2)+'" fill="'+col+'"/>'+
        '<ellipse cx="'+cx+'" cy="'+cy+'" rx="'+rx+'" ry="'+ry+'" fill="'+col+'" transform="rotate(-18 '+cx+' '+cy+')"/>'+
        '</svg>';
    }
    // polovičná/celá: prázdna hlavička pri spodku, dĺžka podľa trvania
    const headRx=headD*0.30, headRy=headD*0.24, gap=headD*0.16, cx=W*0.42, cy=H-headRy-gap;
    const stroke=Math.max(3,headD*0.11);
    let svg='<svg class="noteSvg" viewBox="0 0 '+W+' '+H+'" width="'+W+'" height="'+H+'">';
    if(type==='half'){ // nožička od vrchu obalu po hlavičku
      const stemW=Math.max(3,headD*0.10), stemX=cx+headRx*0.76, top=Math.min(gap, cy-headRy);
      svg+='<rect x="'+(stemX-stemW/2)+'" y="'+top+'" width="'+stemW+'" height="'+(cy-top)+'" rx="'+(stemW/2)+'" fill="'+col+'"/>';
    }
    svg+='<ellipse cx="'+cx+'" cy="'+cy+'" rx="'+(headRx-stroke/2)+'" ry="'+(headRy-stroke/2)+'" fill="none" stroke="'+col+'" stroke-width="'+stroke+'"/>';
    svg+='</svg>';
    return svg;
  }

  function buildPiano(){
    const fall=document.getElementById('pnFall'), keysWrap=document.getElementById('pnKeys');
    fall.innerHTML=''; keysWrap.innerHTML='';
    const toolbarH=parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--toolbar-h'))||60;
    const kbH=Math.min(window.innerHeight*0.32, Math.max(150, window.innerWidth*0.13));
    document.documentElement.style.setProperty('--kb-h', kbH+'px');
    const H=Math.max(120, window.innerHeight-toolbarH-kbH);
    const W=window.innerWidth, keyW=W/8;
    const rate=SPEED_RATE[speedLevel]||1, vy=(H/2.6)*rate;
    const ballD=Math.min(keyW*0.72,76);
    const keyEls=[];
    PN_WHITE.forEach((m,i)=>{
      const k=document.createElement('div'); k.className='pnKey'; k.style.background=PN_COL[m];
      keysWrap.appendChild(k); keyEls.push(k);
      // touchstart preventDefault zabráni iOS lupe/zväčšeniu pri dlhšom podržaní klávesy
      k.addEventListener('touchstart',e=>{ e.preventDefault(); },{passive:false});
      k.addEventListener('touchmove',e=>{ e.preventDefault(); },{passive:false});
      k.addEventListener('pointerdown',e=>{ e.preventDefault(); try{k.setPointerCapture(e.pointerId);}catch(_){ } pianoPress(i); });
      k.addEventListener('pointerup',()=>pianoRelease(i));
      k.addEventListener('pointercancel',()=>pianoRelease(i));
      k.addEventListener('pointerleave',e=>{ if(e.buttons) pianoRelease(i); });
    });
    const beatSec=60/(Math.max(20,+(songData&&songData.bpm)||120)); // dĺžka jednej doby v sekundách
    const notes=(songBeats||[]).map(b=>{
      const idx=pianoKeyIndex(b.m), m=PN_WHITE[idx], col=PN_COL[m];
      const d=Math.max(0.12,+b.d||0.4);
      const beats=d/beatSec;
      // typ noty podľa počtu dôb: celá ≥4, polovičná ≥2, inak štvrťová
      const type = beats>=3.2 ? 'whole' : beats>=1.4 ? 'half' : 'quarter';
      const long = (type!=='quarter');           // polovičnú a celú treba podržať
      const el=document.createElement('div'); el.className='pnNote';
      el.style.width=keyW+'px';
      el.style.transform='translate3d(0,-99999px,0)'; // skry kým ju prvý frame neumiestni (inak blikne vľavo hore)
      let L;
      if(type==='quarter'){                       // štvrťová → kruh
        L=ballD; el.style.height=L+'px';
        el.innerHTML='<div class="ball" style="width:'+ballD+'px;height:'+ballD+'px;background:'+col+'">'+pnGlyphSVG(ballD,ballD,'quarter',ballD)+'</div>';
      } else {                                     // polovičná/celá → obdĺžnik, DĺŽKA = trvanie tónu (d×vy)
        L = Math.max(Math.round(ballD*1.2), Math.round(d*vy));
        el.style.height=L+'px';
        el.innerHTML='<div class="bar" style="width:'+ballD+'px;background:'+col+'"><div class="fill"></div>'+pnGlyphSVG(ballD,L,type,ballD)+'</div>';
      }
      fall.appendChild(el);
      return {m,t:+b.t,d,v:(b.v!=null?+b.v:0.85),idx,L,long,type,el,played:false,pressed:false,holdProg:0,fillEl:long?el.querySelector('.fill'):null};
    });
    notes.sort((a,b)=>a.t-b.t);
    PN={notes,keyEls,keyMidi:PN_WHITE,H,keyW,vy,baseVy:H/2.6,ballD,total:notes.length,played:0,holding:null,playhead:0};
  }

  function applyPianoSpeed(){
    if(!PN) return; const rate=SPEED_RATE[speedLevel]||1;
    PN.vy=PN.baseVy*rate;
    // dlhe noty: dlzka obalu = trvanie tonu, takze pri zmene tempa ju treba prepocitat
    PN.notes.forEach(n=>{ if(!n.el||!n.long) return;
      n.L=Math.max(Math.round(PN.ballD*1.2), Math.round(n.d*PN.vy));
      n.el.style.height=n.L+'px';
      const bar=n.el.querySelector('.bar'), old=bar&&bar.querySelector('.noteSvg');
      if(old){ const tmp=document.createElement('div'); tmp.innerHTML=pnGlyphSVG(PN.ballD,n.L,n.type,PN.ballD); old.replaceWith(tmp.firstChild); }
    });
  }

  function pianoFrame(dt){
    const pn=PN; if(!pn) return;
    let active=null; for(const n of pn.notes){ if(!n.played){ active=n; break; } }
    if(!active && !pn.holding){ finishSong(); return; }
    const barrier=active?active.t:Infinity;
    if(pn.holding){
      const o=pn.holding;
      if(o.pressed){ pn.playhead+=dt; o.holdProg+=dt; } // držím → posúva sa všetko spolu
      if(o.fillEl) o.fillEl.style.height=(Math.min(1,o.holdProg/Math.max(0.25,o.d))*100)+'%';
      if(o.holdProg>=o.d*0.9){ completePianoHold(o); } // 10% tolerancia: stačí podržať 90% trvania
    } else if(pn.playhead<barrier){
      pn.playhead=Math.min(barrier, pn.playhead+dt);
    }
    const ready=active && pn.playhead>=barrier-1e-4;
    for(const n of pn.notes){
      if(n.played||!n.el) continue;
      let bottom=pn.H+(pn.playhead-n.t)*pn.vy;
      n.el.style.transform='translate3d('+(n.idx*pn.keyW)+'px,'+(bottom-n.L)+'px,0)';
      n.el.classList.toggle('ready', !!(ready && Math.abs(n.t-barrier)<1e-4 && n!==pn.holding));
    }
    for(let i=0;i<pn.keyEls.length;i++){
      let aw=false;
      if(ready){ for(const n of pn.notes){ if(!n.played && Math.abs(n.t-barrier)<1e-4 && n.idx===i && n!==pn.holding){ aw=true; break; } } }
      pn.keyEls[i].classList.toggle('await', aw);
    }
    setProgress(pn.total? pn.played/pn.total*100 : 0);
  }

  function pianoPress(idx){
    const pn=PN; if(!pn) return;
    const kEl=pn.keyEls[idx]; if(kEl) kEl.classList.add('down');
    if(!running || gameMode!=='piano') return;
    if(pn.holding && pn.holding.idx===idx){ pn.holding.pressed=true; return; } // pokračuj v držaní
    let active=null; for(const n of pn.notes){ if(!n.played){ active=n; break; } }
    if(!active || pn.playhead<active.t-1e-4) return;            // nota ešte nedoletela
    const cand=pn.notes.find(n=>!n.played && Math.abs(n.t-active.t)<1e-4 && n.idx===idx && n!==pn.holding);
    if(!cand) return;                                            // zlá klávesa → nič (kĺudné)
    if(cand.long){
      pn.holding=cand; cand.pressed=true; cand.holdProg=0;
      if(cand.el) cand.el.classList.add('holding');
      if(kEl) kEl.classList.add('holding'); // svietiaci prstenec na klávese = drž ďalej!
      if(toneP) toneP.hit(pn.keyMidi[idx], Math.max(0.7,cand.d), cand.v);
    } else {
      if(toneP) toneP.hit(pn.keyMidi[idx], cand.d, cand.v);
      cand.played=true; pn.played++; score++; refreshStars();
      popPianoNote(cand); sparkleAtKey(idx);
    }
  }
  function pianoRelease(idx){
    const pn=PN; if(!pn) return;
    const kEl=pn.keyEls[idx]; if(kEl) kEl.classList.remove('down');
    if(pn.holding && pn.holding.idx===idx) pn.holding.pressed=false;
  }
  function completePianoHold(o){
    o.played=true; o.pressed=false; PN.holding=null;
    // Žiadny skok: playhead pokračuje plynule ďalej, tón si v pokoji dobehne zvyšných ~10%,
    // a medzitým sa ďalšia nota plynule blíži ku klávesnici.
    PN.played++; score++; refreshStars();
    popPianoNote(o); sparkleAtKey(o.idx);
    const k=PN.keyEls[o.idx]; if(k) k.classList.remove('await','down','holding');
  }
  function popPianoNote(o){ if(!o.el) return; const el=o.el; o.el=null;
    el.classList.remove('ready','holding'); el.classList.add('pop'); setTimeout(()=>{try{el.remove();}catch(e){}},440); }
  function sparkleAtKey(idx){ try{ const r=PN.keyEls[idx].getBoundingClientRect(); sparkle(r.left+r.width/2, r.top+10); }catch(e){} }

  function startPianoCountdown(){
    cancelAnimationFrame(raf); cancelAnimationFrame(countdownRaf);
    countingDown=false; cdAborted=false; running=false;
    const t0=PN.notes.length?PN.notes[0].t:0;
    PN.playhead=t0-PN.H/PN.vy; // prvá nota práve vchádza zhora
    pianoFrame(0);             // počiatočné rozmiestnenie
    // PIANO: žiadne úvodné stopky — noty padajú hneď, bez ohľadu na úvodnú pauzu v JSON-e
    countdownEl.classList.remove('loading','show');
    running=true; lastTime=0; raf=requestAnimationFrame(loop);
  }
  function clearPiano(){
    if(PN){ PN.notes.forEach(n=>{ if(n.el){ try{n.el.remove();}catch(e){} } }); PN.holding=null; }
  }

  function loop(ts){
    if(!running) return;
    if(!lastTime) lastTime=ts;
    let dt=(ts-lastTime)/1000;
    lastTime=ts;
    if(dt>0.05) dt=0.05; // ochrana pri zaseknutí

    if(songMode && gameMode==='piano'){ pianoFrame(dt); }
    else if(songMode){
      const g=geom();
      const blk=g.block, vy=g.vy, mid=g.mid, vh=g.vh;

      // ČAS PESNIČKY (ta): pred štartom rampuje z -preRoll po 0 (predstih, kým prvá
      // dlaždica doletí do stredu), potom = SKUTOČNÝ čas audia — žiadny drift.
      if(!songStarted){
        songTa += dt;
        if(songTa>=0){
          songTa=0;
          clkSeek(0);
          clkPlay();
          songStarted=true;
        }
      } else if(clkEnded()){ // pesnička skončila — už nezačína znova
        finishSong();
        return;
      } else {
        songTa=clkTime();
      }
      const ta=songTa;

      // spawn dlaždíc zhora — každá viazaná na SVOJ skutočný čas taktu (beats[seq].t)
      let guard=0;
      while(tileSeq<songBeats.length && guard<80){
        const bottomI = mid + (ta - songBeats[tileSeq].t)*vy + blk/2;
        if(bottomI >= -blk){
          const isLong = tileLen(tileSeq, blk, vy) >= blk*LONG_FACTOR;
          const nt=spawnTile(autoLane(), undefined, isLong); nt.seq=tileSeq; nt.note=songBeats[tileSeq];
          if(isTone() && tileStyle==='keys' && nt.note && nt.note.m!=null){
            nt.art.style.background=PN_COL[PN_WHITE[pianoKeyIndex(nt.note.m)]]; // farba pod\u013ea kl\u00e1vesy piana
          }
          tileSeq++; guard++;
        }
        else break;
      }

      // pozícia + dĺžka VŠETKÝCH dlaždíc je daná časom pesničky (bez driftu, presný sync).
      // Spodok klávesy ostáva tam, kde bol — rýchlosť sa NEMENÍ; predlžuje sa len nahor.
      for(const o of tiles){
        if(o.hit||o.dead) continue;
        const len=tileLen(o.seq, blk, vy);
        const bottom = mid + (ta - songBeats[o.seq].t)*vy + blk/2;
        o.y = bottom - len;
        if(len!==o.h){ // výška je konštantná — zapisuj len pri zmene (inak layout každý frame)
          o.h = len;
          o.el.style.height=len+'px';
          if(tileStyle==='keys') o.art.style.height=len+'px';
        }
        o.el.style.transform='translate3d(0,'+o.y+'px,0)';
        // dlhá nota: počas držania zvýrazni postup a po prejdení celého pásu uzná
        if(o.long && o.holding && !o.held){
          const prog=Math.max(0,Math.min(1,(o.y-mid)/len+1));
          o.lastProg=prog;
          if(o.fillEl) o.fillEl.style.height=(prog*100)+'%';
          if(o.y>=mid){ completeHold(o); continue; }
        }
        if(!isTone() && o.y>vh){ o.dead=true; o.el.classList.add('miss'); misses++; refreshStars(); setTimeout(()=>o.el.remove(),500); }
      }
      tiles=tiles.filter(o=>o.el.isConnected);
      // DLAŽDICE-NOTY: ak netťuknutá dlaždica dôjde úplne dole, zastav celú hru a čakaj na ťuknutie
      if(isTone()){
        let blocker=null;
        for(const o of tiles){ if(o.hit||o.dead||o.holding) continue; if(o.y+o.h>=vh-4){ blocker=o; break; } }
        for(const o of tiles){ if(o.hit||o.dead) continue; o.el.classList.toggle('waitpulse', !!(blocker && !o.holding && o.y+o.h>=vh-4)); }
        if(blocker && !waiting){ waiting=true; clkPause(); }
        else if(!blocker && waiting){ waiting=false; clkPlay(); }
      }
      updateProgress();
      updateGapCountdown(ta);
      updateEndConfetti(ta);
    }

    raf=requestAnimationFrame(loop);
  }

  /* ====================== OVLÁDANIE OBRAZOVIEK ====================== */
  function prepareStage(){
    score=0; misses=0; resetStarRow(); finished=false;
    hideConfetti();
    waiting=false;
    tiles.forEach(o=>{stopHoldTone(o);o.el.remove();}); tiles=[];
    if(gameMode==='piano'){
      document.getElementById('lanes').style.display='none';
      document.getElementById('pianoStage').style.display='block';
      buildPiano();
    } else {
      document.getElementById('lanes').style.display='';
      document.getElementById('pianoStage').style.display='none';
      buildLanes();
    }
    menu.style.display='none';
    pause.style.display='none';
    stage.style.display='block';
    running=true; lastTime=0;
    cancelAnimationFrame(raf);
  }

  function startSong(data){
    songMode=true; songData=data;
    // názov skladby do horného toolbaru (veľkými písmenami)
    { const tt=document.getElementById('toolbarTitle');
      if(tt) tt.textContent=(data.title || 'Hudobné dlaždice').toUpperCase(); }
    // po\u010det st\u013apcov ur\u010duje VO\u013dBA V MENU (nie beatmapa). Lane v beatmape sa
    // pou\u017eije ak sed\u00ed; inak sa objekty striedavo rozlo\u017eia medzi st\u013apce.
    songBeats=(data.beats||[]).slice().sort((a,b)=>a.t-b.t);
    // rýchlosť podľa NAJKRATŠIEHO odstupu taktov — dlaždice tak nikdy nesplynú
    // a hustejšie pesničky padajú svižnejšie. Sync je vždy presný (reálne časy taktov).
    let minGap=Infinity;
    for(let i=1;i<songBeats.length;i++){ const g=songBeats[i].t-songBeats[i-1].t; if(g>0.03) minGap=Math.min(minGap,g); }
    if(!isFinite(minGap)||minGap<=0) minGap=0.45;
    fallSpeedTime=Math.max(0.16, Math.min(0.5, minGap));
    lastLane=-1; tileSeq=0;
    ensureAudio(); // triangel + presné hodiny
    mode = detectTones(data) ? 'tones' : 'mp3';
    gameMode = (mode==='tones' && gameChoice==='piano') ? 'piano' : 'tiles';
    speedLevel = (mode==='tones' || gameChoice==='spev') ? 2 : 3; // tóny + HLAS štart na 2; MP3 na originálnej (3)
    songRate = (mode==='tones') ? (SPEED_RATE[speedLevel]||1) : 1;
    showSpeedLive();
    if(toneP){ toneP.destroy(); toneP=null; }
    if(mode==='tones'){
      toneP=buildTonePlayer(data);
      try{ songAudio.pause(); }catch(e){}
      keepAliveOn(); // iOS: drž session v playback, aby tóny boli počuť aj pri stíšení
    } else {
      keepAliveOff(); // MP3 si session drží samo
      songAudio.src=data.audioUrl;
      songAudio.loop=false; // cyklus riešime sami (kvôli predstihu)
      try{ songAudio.preservesPitch=true; songAudio.mozPreservesPitch=true; songAudio.webkitPreservesPitch=true; }catch(e){}
      try{ songAudio.playbackRate=MP3_RATE[speedLevel]||1; }catch(e){}
      try{ songAudio.pause(); songAudio.currentTime=0; }catch(e){}
    }
    prepareStage();
    progDone=false; setProgress(0);
    if(gameMode==='piano'){ startPianoCountdown(); return; }
    // predstih: kým prvá dlaždica doletí zhora do stredu (len ak prvý takt príde skôr)
    const {block}=tileSize();
    leadIn=(hitLineY() + block/2)/fallVy();
    const firstT=songBeats.length?songBeats[0].t:0;
    preRoll=Math.max(0, leadIn-firstT);
    songTa=-preRoll; songStarted=false;
    startCountdown();
  }

  // Hudba aj hra idú HNEĎ, ale až keď audio NAOZAJ začne hrať (nečakáme s frozen
  // obrazovkou na buffer). Kým sa pesnička načítava, stopky ukazujú „načítavam".
  // Audio je potom hlavné hodiny → presný sync.
  function launchRun(firstT){
    countdownEl.classList.remove('loading');
    running=true; lastTime=0;
    raf=requestAnimationFrame(loop);
    countingDown=true;
    let lastShown=-1;
    (function step(){
      if(!countingDown) return;
      const remain=firstT-(clkTime()||0);
      if(remain<=0){ countingDown=false; countdownEl.classList.remove('show'); return; }
      const ci=Math.ceil(remain);
      if(ci!==lastShown){ lastShown=ci; countNum.textContent=ci; countNum.classList.remove('tick'); void countNum.offsetWidth; countNum.classList.add('tick'); }
      countdownRaf=requestAnimationFrame(step);
    })();
  }

  function startCountdown(){
    cancelAnimationFrame(raf);
    cancelAnimationFrame(countdownRaf);
    countingDown=false;
    cdAborted=false;
    // ukáž stopky hneď v „načítava sa" stave
    countdownEl.classList.add('show','loading');
    countNum.textContent='';
    songStarted=true;
    const firstT=songBeats.length?songBeats[0].t:0;

    // TÓNY (DLAŽDICE): žiadne úvodné stopky — spusti rovno, dlaždice padajú hneď
    if(isTone()){
      if(actx&&actx.state==='suspended') actx.resume();
      clkSeek(0); clkPlay();
      countdownEl.classList.remove('show','loading');
      running=true; lastTime=0; countingDown=false;
      raf=requestAnimationFrame(loop);
      return;
    }

    // MP3: počkaj, kým audio reálne začne hrať (hlavné hodiny)
    let begun=false;
    function begin(){ if(begun||cdAborted) return; begun=true; cleanup(); launchRun(firstT); }
    function onPlaying(){ begin(); }
    function onTime(){ if((songAudio.currentTime||0)>0) begin(); }
    function cleanup(){
      songAudio.removeEventListener('playing',onPlaying);
      songAudio.removeEventListener('timeupdate',onTime);
    }
    songAudio.addEventListener('playing',onPlaying);
    songAudio.addEventListener('timeupdate',onTime);

    // spusti prehrávanie od začiatku
    try{ songAudio.currentTime=0; }catch(e){}
    try{ songAudio.load(); }catch(e){}
    songAudio.play().catch(()=>{});
    // ak je už pripravené a beží, rozbehni okamžite
    if(songAudio.readyState>=3 && !songAudio.paused && songAudio.currentTime>0) begin();
  }

  function setSongStatus(msg){ document.getElementById('songStatus').innerHTML=msg; }

  // automatické načítanie všetkých .json beatmáp z GitHub adresára do roletky (select)
  const SONGS_REPO='https://api.github.com/repos/PcProfisro/moje-pesnicky/contents';
  const songSelect=document.getElementById('songSelect');
  const songCache={}; // url -> data
  const bust=u=>u+(u.includes('?')?'&':'?')+'_cb='+Date.now(); // proti CDN cache
  async function fetchSongList(){
    songSelect.innerHTML='<option value="">Načítavam…</option>';
    setSongStatus('');
    try{
      const res=await fetch(bust(SONGS_REPO),{cache:'no-store'});
      if(!res.ok) throw 0;
      const items=await res.json();
      const jsons=Array.isArray(items)? items.filter(it=>it.type==='file' && /\.json$/i.test(it.name)) : [];
      if(!jsons.length){ songSelect.innerHTML='<option value="">— žiadne pesničky —</option>'; setSongStatus('Zatiaľ tu nie sú žiadne pesničky. Priprav ich v <a href="Editor.html">Editore</a> alebo <a href="Convertor.html">Convertore</a>.'); return; }
      jsons.sort((a,b)=>a.name.localeCompare(b.name,'sk'));
      songSelect.innerHTML='';
      for(const it of jsons){
        const opt=document.createElement('option');
        opt.value=it.download_url;
        opt.textContent=it.name.replace(/\.json$/i,'');
        songSelect.appendChild(opt);
        // dotažné načítanie pekného názvu + predpríprava dát
        fetch(bust(it.download_url),{cache:'no-store'}).then(r=>r.json()).then(d=>{
          if(d && Array.isArray(d.beats) && (d.audioUrl || detectTones(d))){ songCache[it.download_url]=d; if(d.title) opt.textContent=d.title; updateSpeedVisibility(); }
        }).catch(()=>{});
      }
    }catch(e){
      songSelect.innerHTML='<option value="">— chyba —</option>';
      setSongStatus('Nepodarilo sa načítať zoznam z GitHubu — skús <strong>↻</strong>.');
    }
  }

  // Odomkne <audio> v rámci ťuknutia (gesto používateľa). Bez tohto by neskoršie
  // play() po asynchrónnom načítaní beatmapy zablokovala autoplay politika (mobil).
  const SILENT_WAV='data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=';
  let audioPrimed=false;
  function primeAudio(){
    if(audioPrimed) return;
    audioPrimed=true;
    // KĽÚČOVÉ pre iOS Safari: AudioContext treba VYTVORIŤ aj odomknúť priamo
    // v geste (ťuknutí). Inak ostane utlmený a tónový (Web Audio) režim je ticho,
    // hoci MP3 (cez <audio>) hrá. Preto kontext založíme tu, hneď ho rozbehneme
    // a "odpálime" krátky tichý buffer — to je štandardný iOS unlock.
    try{
      ensureAudio();
      if(actx.state==='suspended') actx.resume();
      const b=actx.createBuffer(1,1,22050);
      const s=actx.createBufferSource(); s.buffer=b; s.connect(actx.destination); s.start(0);
    }catch(e){}
    // odomkni aj tichý keep-alive (iOS unmute trik) v rámci toho istého gesta
    try{ ensureKeepAlive(); const kp=keepAlive.play(); if(kp&&kp.then) kp.then(()=>{ try{ keepAlive.pause(); keepAlive.currentTime=0; }catch(e){} }).catch(()=>{}); }catch(e){}
    // odomkni aj potleskový <audio> v rámci toho istého gesta (inak ho autoplay
    // politika na konci pesničky zablokuje a potlesk nezaznie)
    try{
      const ap=document.getElementById('applauseAudio');
      if(ap){
        ap.muted=true;
        const pp=ap.play();
        if(pp && pp.then) pp.then(()=>{ try{ ap.pause(); ap.currentTime=0; ap.muted=muted; }catch(e){} }).catch(()=>{ try{ ap.muted=muted; }catch(e){} });
      }
    }catch(e){}
    try{
      songAudio.src=SILENT_WAV;
      const p=songAudio.play();
      if(p && p.then) p.then(()=>{
        // pauzni len ak je ešte načítaný ticho-klip (nie už reálna pesnička)
        if(songAudio.src===SILENT_WAV){ try{ songAudio.pause(); }catch(e){} }
      }).catch(()=>{ audioPrimed=false; });
    }catch(e){ audioPrimed=false; }
  }

  async function startSelected(){
    const url=songSelect.value;
    if(!url){ setSongStatus('Najprv vyber pesničku.'); return; }
    primeAudio(); // ODOMKNUTIE zvuku v geste ťuknutia (pred async načítaním)
    const cached=songCache[url];
    // SPEV: namiesto tónov spusti padajúce dlaždice na spievanú MP3 z odkazu songUrl
    if(gameChoice==='spev' && cached && cached.songUrl){ loadSpev(cached); return; }
    if(cached){ setSongStatus(''); startSong(cached); return; }
    playFromUrl(url);
  }

  // Načíta spievanú verziu (súbor z songUrl — MP3 beatmapa) a spustí padajúce dlaždice.
  async function loadSpev(parent){
    setSongStatus('Načítavam spev…');
    try{
      const res=await fetch(bust(parent.songUrl),{cache:'no-store'});
      if(!res.ok) throw 0;
      const data=await res.json();
      if(!Array.isArray(data.beats) || !data.beats.length) throw 0;
      if(!data.audioUrl && !detectTones(data)) throw 0;
      if(!data.title && parent.title) data.title=parent.title; // prevezmi názov z rodiča
      setSongStatus('');
      startSong(data);
    }catch(e){
      setSongStatus('Spev sa nepodarilo načítať.');
    }
  }

  async function playFromUrl(url){
    setSongStatus('Načítavam pesničku…');
    try{
      const res=await fetch(bust(url),{cache:'no-store'});
      if(!res.ok) throw 0;
      const data=await res.json();
      if(!Array.isArray(data.beats) || !data.beats.length) throw 0;
      if(!data.audioUrl && !detectTones(data)) throw 0;
      songCache[url]=data;
      setSongStatus('');
      startSong(data);
    }catch(e){
      setSongStatus('Pesničku sa nepodarilo načítať.');
    }
  }

  function pauseGame(){
    if(finished) return;
    running=false; cancelAnimationFrame(raf);
    cdAborted=true; countingDown=false; gapActive=false; cancelAnimationFrame(countdownRaf); countdownEl.classList.remove('show','loading'); hideConfetti();
    clkPause();
    tiles.forEach(o=>stopHoldTone(o));
    if(PN&&PN.holding) PN.holding.pressed=false;
    document.getElementById('pauseTitle').style.display='';
    document.getElementById('pauseScore').style.display='';
    document.getElementById('pauseTitle').innerHTML='<span class="b">Pauza</span>';
    document.getElementById('resumeBtn').innerHTML='<span class="pico">▶</span>Pokračovať';
    renderPauseStars();
    pause.style.display='flex';
  }
  function finishSong(){
    if(finished) return;
    finished=true;
    running=false; cancelAnimationFrame(raf);
    cdAborted=true; countingDown=false; gapActive=false; cancelAnimationFrame(countdownRaf); countdownEl.classList.remove('show','loading');
    try{ clkPause(); }catch(e){}
    tiles.forEach(o=>{stopHoldTone(o);o.el.remove();}); tiles=[];
    // potlesk zaznie HNEĎ na konci; konfety bežia ďalej; popup až keď potlesk doznie
    confettiEl.classList.add('show');
    clearPiano();
    // zapamätaj hviezdičky z tohto kola pre zobrazenie v menu
    setLastStars(litFromRatio());

    function showEndPopup(){
      hideConfetti();
      // bez obrazovky „Hrať znova“ — rovno späť do menu (hore sa zobrazia hviezdičky z kola)
      goMenu();
    }

    const ap=document.getElementById('applauseAudio');
    if(!muted && ap){
      try{ ap.currentTime=0; ap.play().catch(()=>{}); }catch(e){}
      let shown=false;
      const reveal=()=>{ if(shown||!finished)return; shown=true; ap.removeEventListener('ended',reveal); showEndPopup(); };
      ap.addEventListener('ended',reveal);
      const dur=(isFinite(ap.duration)&&ap.duration>0)?ap.duration:3;
      setTimeout(reveal,(dur+0.25)*1000); // poistka, keby 'ended' nezaznelo
    } else {
      showEndPopup();
    }
  }
  function renderPauseStars(){
    const box=document.getElementById('pauseStars');
    const n=litFromRatio();
    const attempts=score+misses;
    let html='';
    for(let i=0;i<STARS_PER_SET;i++){
      const on=i<n;
      html+='<svg viewBox="0 0 24 24"><path d="'+STAR_PATH+'" fill="'+(on?'#ffae0d':'#e3ecf0')+'" stroke="'+(on?'#d99500':'#cdd9df')+'" stroke-width="1" stroke-linejoin="round"/></svg>';
    }
    box.innerHTML=html;
    const msg=document.getElementById('pauseScore');
    if(attempts<=0) msg.textContent='Ťukaj na dlaždice! 🌟';
    else if(n>=5) msg.textContent='Paňáda! 🌈';
    else if(n>=3) msg.textContent='Skvele ti to ide!';
    else msg.textContent='Len tak ďalej!';
  }
  function resumeGame(){
    pause.style.display='none';
    if(actx&&actx.state==='suspended') actx.resume();
    if(isTone()) keepAliveOn(); // iOS: obnov tich\u00fd keep-alive
    running=true; lastTime=0;
    clkPlay(); // ta=clkTime() -> sync sa obnoví sám
    waiting=false; // znova vyhodnotí čakanie v slučke
    raf=requestAnimationFrame(loop);
    // ak prvá dlaždica ešte neprišla, znova ukáž stopky
    const firstT=songBeats.length?songBeats[0].t:0;
    if((clkTime()||0)<firstT && !countingDown && gameMode!=='piano' && !isTone()){
      countingDown=true; countdownEl.classList.add('show');
      let lastShown=-1;
      (function step(){
        if(!countingDown) return;
        const remain=firstT-(clkTime()||0);
        if(remain<=0){ countingDown=false; countdownEl.classList.remove('show'); return; }
        const ci=Math.ceil(remain);
        if(ci!==lastShown){ lastShown=ci; countNum.textContent=ci; countNum.classList.remove('tick'); void countNum.offsetWidth; countNum.classList.add('tick'); }
        countdownRaf=requestAnimationFrame(step);
      })();
    }
  }
  function goMenu(){
    renderWonBanner();
    running=false; cancelAnimationFrame(raf);
    cdAborted=true; countingDown=false; gapActive=false; cancelAnimationFrame(countdownRaf); countdownEl.classList.remove('show','loading'); hideConfetti();
    clkPause();
    if(toneP){ toneP.destroy(); toneP=null; }
    keepAliveOff();
    clearPiano(); PN=null; gameMode='tiles';
    document.getElementById('pianoStage').style.display='none';
    document.getElementById('lanes').style.display='';
    document.getElementById('speedLive').style.display='none';
    waiting=false;
    mode='mp3';
    songMode=false; finished=false;
    { const tt=document.getElementById('toolbarTitle'); if(tt) tt.textContent='PESNIČKY PRE DETI'; }
    tiles.forEach(o=>{stopHoldTone(o);o.el.remove();}); tiles=[];
    pause.style.display='none';
    stage.style.display='none';
    menu.style.display='flex';
  }

  /* ====================== VÝBERY V MENU ====================== */
  // Hviezdičky z posledného dohraného kola — zobrazia sa hore v menu.
  let lastStars=-1;
  function setLastStars(n){ lastStars=n; }
  function renderWonBanner(){
    const b=document.getElementById('wonBanner');
    const box=document.getElementById('wonStars');
    if(!b||!box) return;
    if(lastStars<0){ b.style.display='none'; return; }
    let html='';
    for(let i=0;i<STARS_PER_SET;i++){
      const on=i<lastStars;
      html+='<svg viewBox="0 0 24 24"><path d="'+STAR_PATH+'" fill="'+(on?'#ffae0d':'#e3ecf0')+'" stroke="'+(on?'#d99500':'#cdd9df')+'" stroke-width="1" stroke-linejoin="round"/></svg>';
    }
    box.innerHTML=html;
    b.style.display='flex';
  }
  function wireChoices(containerId,attr,cb){
    const c=document.getElementById(containerId);
    c.addEventListener('click',e=>{
      const b=e.target.closest('.choice'); if(!b) return;
      [...c.querySelectorAll('.choice')].forEach(x=>x.classList.remove('sel'));
      b.classList.add('sel');
      cb(b.getAttribute(attr));
    });
  }
  cols=3; // pevne 3 stĺpce

  document.getElementById('homeBtn').addEventListener('click',pauseGame);
  document.getElementById('resumeBtn').addEventListener('click',resumeGame);
  document.getElementById('toMenuBtn').addEventListener('click',goMenu);

  /* ====================== eduAlf TOOLBAR ====================== */
  const SND_ON='<svg viewBox="0 0 32 32" width="30" height="30" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 12h4l7-5v18l-7-5H6z"></path><path d="M22 11a6 6 0 010 10"></path><path d="M25 7a11 11 0 010 18"></path></svg>';
  const SND_OFF='<svg viewBox="0 0 32 32" width="30" height="30" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 12h4l7-5v18l-7-5H6z"></path><path d="M22 12l8 8M30 12l-8 8"></path></svg>';
  const soundBtn=document.getElementById('soundBtn');
  function renderSound(){ soundBtn.innerHTML=muted?SND_OFF:SND_ON; soundBtn.setAttribute('aria-label',muted?'Zapnúť zvuk':'Vypnúť zvuk'); }
  renderSound();
  soundBtn.addEventListener('click',()=>{
    muted=!muted;
    songAudio.muted=muted;
    const ap=document.getElementById('applauseAudio');
    if(ap){ ap.muted=muted; if(muted){ try{ ap.pause(); }catch(e){} } }
    if(actx&&actx.state==='suspended') actx.resume();
    renderSound();
  });

  const fsBtn=document.getElementById('fsBtn');
  fsBtn.addEventListener('click',()=>{
    if(!document.fullscreenElement){ (document.documentElement.requestFullscreen||document.documentElement.webkitRequestFullscreen||function(){}).call(document.documentElement); }
    else { (document.exitFullscreen||document.webkitExitFullscreen||function(){}).call(document); }
  });
  // po vstupe/výstupe z celej obrazovky prepni ikonu (rozšíriť ↔ zmenšiť)
  function syncFsBtn(){
    const on=!!(document.fullscreenElement||document.webkitFullscreenElement);
    fsBtn.classList.toggle('is-fs',on);
    fsBtn.setAttribute('aria-label', on?'Zmenšiť':'Celá obrazovka');
  }
  document.addEventListener('fullscreenchange',syncFsBtn);
  document.addEventListener('webkitfullscreenchange',syncFsBtn);

  document.getElementById('closeBtn').addEventListener('click',()=>{
    if(menu.style.display!=='none' && stage.style.display==='none'){
      // už sme v menu — skús zavrieť / vrátiť späť do eduAlf launcheru
      if(history.length>1) history.back();
    } else {
      goMenu();
    }
  });

  // presná výška toolbaru → herná lišta sadá teśne podňho
  function syncToolbarH(){
    const tb=document.querySelector('.eda-toolbar');
    if(tb) document.documentElement.style.setProperty('--toolbar-h', tb.offsetHeight+'px');
  }
  syncToolbarH();
  window.addEventListener('resize',syncToolbarH);

  // výber pesničky + ŠTART
  const gameGroup=document.getElementById('gameGroup');
  const gameChoices=document.getElementById('gameChoices');
  const spevChoice=document.getElementById('spevChoice');
  function selectGameChoice(g){
    gameChoice=g||'tiles';
    [...gameChoices.querySelectorAll('.choice')].forEach(x=>x.classList.toggle('sel', x.dataset.game===gameChoice));
  }
  gameChoices.addEventListener('click',e=>{
    const b=e.target.closest('.choice'); if(!b) return;
    selectGameChoice(b.dataset.game||'tiles');
  });
  // PC klávesy pre mód PIANO
  const pnDownKeys=new Set();
  window.addEventListener('keydown',e=>{ if(gameMode!=='piano') return;
    const i=PN_PC.indexOf(e.key.toLowerCase());
    if(i>=0){ e.preventDefault(); if(!pnDownKeys.has(i)){ pnDownKeys.add(i); pianoPress(i); } } });
  window.addEventListener('keyup',e=>{ const i=PN_PC.indexOf(e.key.toLowerCase());
    if(i>=0){ pnDownKeys.delete(i); pianoRelease(i); } });
  function updateSpeedVisibility(){
    const d=songCache[songSelect.value];
    const t=!!(d && detectTones(d));
    const hasSpev=!!(d && d.songUrl);            // pieseň má odkaz na spievanú (mp3) verziu
    gameGroup.style.display=(t||hasSpev)?'':'none';
    if(spevChoice) spevChoice.style.display=hasSpev?'':'none';
    // ak aktuálne vybraná voľba už pre túto pesničku neexistuje, vráť sa na Dlaždice
    if((gameChoice==='spev' && !hasSpev) || (gameChoice==='piano' && !t)) selectGameChoice('tiles');
  }
  // živý prepínač tempa počas hry (1-2-3) — dlaždice aj piano
  const speedLive=document.getElementById('speedLive');
  function syncSpeedButtons(){
    [...speedLive.querySelectorAll('button')].forEach(x=>x.classList.toggle('sel', +x.dataset.spd===speedLevel));
  }
  function setSpeedLive(level){
    speedLevel=level||2; syncSpeedButtons();
    if(gameMode==='piano'){ applyPianoSpeed(); }
    else if(isTone()){ const w=clkTime(); songRate=SPEED_RATE[speedLevel]||1; if(toneP) toneP.seek(w); }
    else { try{ songAudio.playbackRate=MP3_RATE[speedLevel]||1; }catch(e){} }
  }
  speedLive.addEventListener('click',e=>{ const b=e.target.closest('button'); if(!b) return; setSpeedLive(parseInt(b.dataset.spd,10)||2); });
  function showSpeedLive(){ speedLive.style.display='flex'; syncSpeedButtons(); }
  songSelect.addEventListener('change',updateSpeedVisibility);
  document.getElementById('refreshSongs').addEventListener('click',fetchSongList);
  document.getElementById('startBtn').addEventListener('click',startSelected);
  songAudio.addEventListener('error',()=>{ if(songMode&&!isTone()&&songAudio.src) setSongStatus('Pesničku (MP3) sa nepodarilo prehrať — skontroluj odkaz v beatmape.'); });
  (function(){
    const params=new URLSearchParams(location.search);
    // skúšobná pesnička z Convertora (cez localStorage) — čaká na gésto ŠTART
    if(params.get('try')){
      try{
        const raw=localStorage.getItem('musictiles_tryout');
        const data=raw?JSON.parse(raw):null;
        if(data && Array.isArray(data.beats) && data.beats.length){
          const opt=document.createElement('option');
          opt.value='__tryout__';
          opt.textContent='▶ '+((data.title||'Skúšobná pesnička'))+' (z Convertora)';
          songSelect.innerHTML=''; songSelect.appendChild(opt);
          songCache['__tryout__']=data;
          setSongStatus('Skúšobná pesnička z Convertora je pripravená — stlač ŠTART.');
          updateSpeedVisibility();
          return;
        }
      }catch(e){}
    }
    const q=params.get('song');
    if(q){ playFromUrl(q); } else { fetchSongList(); }
  })();

  // pri zmene veľkosti okna prestav stĺpce (zachová beh)
  let rsz;
  window.addEventListener('resize',()=>{
    clearTimeout(rsz);
    rsz=setTimeout(()=>{ if(running){ /* dlaždice nechá dopadnúť, nové budú mať novú veľkosť */ } },200);
  });

  document.addEventListener('visibilitychange',()=>{
    if(document.hidden && running) pauseGame();
  });
})();
</script>
</body>
</html>
